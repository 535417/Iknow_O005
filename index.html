<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="theme-color" content="#f0f5f3">
  <meta name="mobile-web-app-capable" content="yes">
  <title>定向越野图例训练系统</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎯</text></svg>">
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎯</text></svg>">
</head>
<body>
  <div class="app">
    <!-- Header -->
    <div class="header">
      <h1>定向越野图例训练</h1>
      <div class="subtitle">Orienteering Legend Training System</div>
    </div>

    <!-- Home View -->
    <div class="view active" id="homeView">
      <!-- Primary Action: Start Training -->
      <div class="hero-action">
        <button class="btn-start-training" data-view="training">
          <span class="hero-icon">🎯</span>
          <span class="hero-text">开始今日训练</span>
          <span class="hero-sub" id="heroSub">智能推荐 20 题</span>
        </button>
      </div>

      <!-- Quick Stats (compact) -->
      <div class="quick-stats">
        <div class="quick-stat">
          <span class="qs-value" id="todayCount">0</span>
          <span class="qs-label">今日</span>
        </div>
        <div class="quick-stat-divider"></div>
        <div class="quick-stat">
          <span class="qs-value" id="totalSeen">0</span>
          <span class="qs-label">已学</span>
        </div>
        <div class="quick-stat-divider"></div>
        <div class="quick-stat">
          <span class="qs-value" id="avgSpeed">0%</span>
          <span class="qs-label">秒认率</span>
        </div>
      </div>

      <!-- Weak Legends (actionable) -->
      <div class="section">
        <div class="section-header">
          <h3 class="section-title">需要强化</h3>
          <a class="section-link" data-view="library">查看全部</a>
        </div>
        <div id="weakLegends">
          <div class="empty-hint">暂无弱点图例，开始训练吧！</div>
        </div>
      </div>

      <!-- Progress (collapsible) -->
      <details class="progress-details">
        <summary class="progress-summary">
          <span>学习进度</span>
          <span id="progressText">0%</span>
        </summary>
        <div class="progress-body">
          <div class="progress-bar">
            <div class="progress-fill" id="progressBar" style="width: 0%"></div>
          </div>
          <div class="mastery-grid">
            <div class="mastery-item">
              <div class="mastery-dot new"></div>
              <div class="mastery-count" id="newCount">390</div>
              <div class="mastery-label">未学习</div>
            </div>
            <div class="mastery-item">
              <div class="mastery-dot learning"></div>
              <div class="mastery-count" id="learningCount">0</div>
              <div class="mastery-label">学习中</div>
            </div>
            <div class="mastery-item">
              <div class="mastery-dot stable"></div>
              <div class="mastery-count" id="stableCount">0</div>
              <div class="mastery-label">稳定</div>
            </div>
            <div class="mastery-item">
              <div class="mastery-dot automatic"></div>
              <div class="mastery-count" id="automaticCount">0</div>
              <div class="mastery-label">自动化</div>
            </div>
          </div>
        </div>
      </details>

      <!-- Recommended (compact) -->
      <div class="section">
        <div class="section-header">
          <h3 class="section-title">今日推荐</h3>
        </div>
        <div class="rec-grid" id="recommended">
          <div class="empty-hint">加载中...</div>
        </div>
      </div>
    </div>

    <!-- Training View -->
    <div class="view" id="trainingView">
      <div class="training-progress">
        <div class="training-progress-fill" id="trainingProgress"></div>
      </div>
      <div id="trainingContent">
        <!-- Training content will be dynamically loaded -->
      </div>
    </div>

    <!-- Library View (iframe) -->
    <div class="view" id="libraryView">
      <iframe src="library.html" style="width:100%;height:100vh;border:none;display:block"></iframe>
    </div>

    <!-- Detail View -->
    <div class="view" id="detailView">
      <div id="detailContent">
        <!-- Detail content will be dynamically loaded -->
      </div>
    </div>

    <!-- Bottom Navigation -->
    <div class="bottom-nav">
      <button class="nav-item active" data-view="home">
        <span class="nav-icon">🏠</span>
        <span>首页</span>
      </button>
      <button class="nav-item" data-view="training">
        <span class="nav-icon">🎯</span>
        <span>训练</span>
      </button>
      <button class="nav-item" data-view="library">
        <span class="nav-icon">📚</span>
        <span>图例库</span>
      </button>
    </div>
  </div>

  <!-- Scripts -->
  <script src="js/data.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/confusion.js"></script>
  <script src="js/scheduler.js"></script>
  <script src="js/training.js"></script>
  <script src="js/app.js"></script>
  <script>
    // Fix mobile viewport height (handles browser chrome resize)
    function setVH() {
      const vh = window.innerHeight * 0.01;
      document.documentElement.style.setProperty('--vh', `${vh}px`);
    }
    
    // Set on load
    setVH();
    
    // Set on resize (handles browser chrome show/hide)
    window.addEventListener('resize', setVH);
    window.addEventListener('orientationchange', () => {
      setTimeout(setVH, 100);
    });
    
    // Initialize app when DOM is ready
    document.addEventListener('DOMContentLoaded', () => {
      App.init();
    });
  </script>
</body>
</html>
